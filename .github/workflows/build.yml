name: CI + SonarCloud

on:
  push:
    branches: [ main, develop, W1-* ]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --include=dev

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests with coverage
        run: npm run test --if-present

      - name: List coverage artifacts
        if: always()
        run: ls -lah coverage || true

      - name: Build
        run: npm run build --if-present

      - name: Check SONAR_TOKEN
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "::error::SONAR_TOKEN is missing"; exit 1;
          else
            echo "SONAR_TOKEN present ✅";
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        with:
          args: >
            -Dsonar.verbose=true
            -Dsonar.branch.name=local-act
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Sonar Quality Gate
        if: ${{ github.event_name == 'push' && github.actor != 'nektos/act' }}
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        timeout-minutes: 5
